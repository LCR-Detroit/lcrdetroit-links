<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Content Security Policy: allow only what this page uses.
       - script:  our own app.js (self) + the pinned QR library on jsDelivr (SRI'd below)
       - style:   inline <style> block + Google Fonts stylesheet
       - font:    Google Fonts files
       - img:     self + data: URIs (the generated QR code is a data: GIF)
       - connect: self — app.js fetches config.json (the page's content) same-origin
       - frame:   the lazy media embeds (Spotify / Apple Podcasts / YouTube-nocookie)
       Everything else (objects, other outbound connections) is denied.
       frame-ancestors intentionally omitted so /links can be iframe-embedded later. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-src https://open.spotify.com https://embed.podcasts.apple.com https://www.youtube-nocookie.com; base-uri 'none'; form-action 'none'" />

  <title>LifeChurch Riverside Detroit — Links</title>
  <meta name="description" content="Listen, watch, give, and connect with LifeChurch Riverside Detroit." />

  <!-- Open Graph / social preview -->
  <meta property="og:title" content="LifeChurch Riverside Detroit" />
  <meta property="og:description" content="Listen, watch, give, and connect with us." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://lcrdetroit.org/links" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,500;1,600&display=swap" rel="stylesheet" />

  <style>
    :root{
      --accent:#1C5C46;
      --bg:#EBE7DC;
      --bg-glow:#F3EFE6;
      --card:#F5F2EB;
      --card-bd:rgba(31,29,24,.07);
      --ink:#211F1A;
      --ink-soft:#4C473D;
      --muted:#8E8779;
      --label:#A29B8C;
      --shadow:0 1px 2px rgba(40,35,25,.04), 0 6px 18px rgba(40,35,25,.05);
      --shadow-hi:0 2px 4px rgba(40,35,25,.06), 0 14px 32px rgba(40,35,25,.10);
      --radius:18px;
      --maxw:480px;
      --sans:"Helvetica Neue",Helvetica,system-ui,-apple-system,sans-serif;
      --serif:"Spectral",Georgia,serif;
    }
    /* Auto dark mode — follows the visitor's device setting */
    @media (prefers-color-scheme:dark){
      :root{
        --bg:#181611;
        --bg-glow:#211E17;
        --card:#23201A;
        --card-bd:rgba(255,251,240,.08);
        --ink:#F1ECE1;
        --ink-soft:#C8C1B2;
        --muted:#8E8779;
        --label:#7C7567;
        --shadow:0 1px 2px rgba(0,0,0,.25), 0 8px 22px rgba(0,0,0,.28);
        --shadow-hi:0 2px 4px rgba(0,0,0,.3), 0 16px 36px rgba(0,0,0,.4);
      }
      .mark{background:#2C2820;}
    }
    *{box-sizing:border-box;}
    html,body{margin:0;}
    body{
      font-family:var(--sans);
      color:var(--ink);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    .page{
      min-height:100vh;
      background:
        radial-gradient(120% 60% at 50% -8%, var(--bg-glow), transparent 60%),
        var(--bg);
      padding:48px 22px 40px;
      transition:background .3s ease,color .3s ease;
    }
    .wrap{max-width:var(--maxw);margin:0 auto;}

    /* ---- header ---- */
    .head{
      display:flex;flex-direction:column;align-items:center;text-align:center;
      margin-bottom:40px;
    }
    .mark{
      width:96px;height:96px;border-radius:50%;
      background:#FCFBF7;
      display:flex;align-items:center;justify-content:center;
      margin:0 0 26px;
      box-shadow:0 2px 6px rgba(40,35,25,.07), 0 12px 30px rgba(40,35,25,.10);
    }
    .mark span{
      font-family:var(--serif);font-weight:600;font-size:26px;
      letter-spacing:.04em;color:var(--accent);
    }
    .brandname{
      font-family:var(--serif);font-weight:600;white-space:nowrap;
      font-size:clamp(20px,5.7vw,29px);line-height:1.2;letter-spacing:-.01em;
      margin:0 0 12px;color:var(--ink);max-width:100%;
    }
    .brandname em{font-style:italic;color:var(--accent);}
    .tagline{margin:0;color:var(--muted);font-size:15.5px;letter-spacing:.005em;}
    .visit{
      display:inline-flex;align-items:center;gap:5px;
      margin-top:20px;
      font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
      color:var(--accent);text-decoration:none;
      padding:4px 2px;border-radius:6px;transition:opacity .15s ease;
    }
    .visit svg{width:13px;height:13px;}
    .visit:hover{opacity:.65;}
    .visit:focus-visible{outline:2px solid var(--accent);outline-offset:3px;}

    /* ---- sections ---- */
    .section{margin-bottom:26px;}
    .seclabel{
      margin:0 0 11px 4px;
      font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;
      color:var(--label);
    }
    .cards{display:flex;flex-direction:column;gap:11px;}

    /* ---- card ---- */
    .card{
      position:relative;
      display:flex;flex-direction:column;
      background:var(--card);
      border:1px solid var(--card-bd);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }
    /* The row is the tap target's positioning context, so the drawer below it
       stays interactive (not covered by the stretched link). */
    .card__row{position:relative;display:flex;align-items:center;gap:14px;padding:15px 16px;}
    .card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hi);border-color:color-mix(in oklab,var(--accent) 22%,var(--card-bd));}
    .card:has(.card__drawer:not([hidden])):hover{transform:none;}
    .card__hit{position:absolute;inset:0;z-index:1;border-radius:var(--radius);}
    .card__hit:focus-visible{outline:2.5px solid var(--accent);outline-offset:-3px;}

    .card__logo{flex:0 0 auto;width:38px;height:38px;display:flex;align-items:center;justify-content:center;}
    .card__logo .brand{width:38px;height:38px;border-radius:9px;display:block;}
    .card__logo .glyph{width:26px;height:26px;color:var(--accent);}

    .card__meta{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1;}
    .card__title{font-weight:700;font-size:15.5px;color:var(--ink);letter-spacing:-.005em;line-height:1.25;}
    .card__desc{font-size:12.5px;color:var(--muted);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    .card__right{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
    .card__actions{display:flex;align-items:center;gap:2px;position:relative;z-index:2;}
    .card__ext{display:flex;color:var(--muted);opacity:.7;pointer-events:none;}
    .card__ext svg{width:17px;height:17px;}

    .iconbtn{
      width:32px;height:32px;flex:0 0 auto;
      display:flex;align-items:center;justify-content:center;
      border:none;background:transparent;color:var(--muted);
      border-radius:9px;cursor:pointer;
      transition:background .14s ease,color .14s ease,transform .1s ease;
    }
    .iconbtn svg{width:16px;height:16px;}
    .iconbtn:hover{background:color-mix(in oklab,var(--accent) 12%,transparent);color:var(--accent);}
    .iconbtn:active{transform:scale(.9);}
    .iconbtn:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}

    /* ---- "latest" drawer toggle + embed ---- */
    .card__more{
      position:relative;z-index:2;
      display:flex;align-items:center;justify-content:center;gap:6px;
      width:100%;padding:9px 16px;
      border:none;border-top:1px solid var(--card-bd);background:transparent;
      color:var(--muted);font-family:var(--sans);
      font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
      cursor:pointer;transition:background .14s ease,color .14s ease;
    }
    .card__more:hover{background:color-mix(in oklab,var(--accent) 7%,transparent);color:var(--accent);}
    .card__more:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;}
    .card__more .chev{width:13px;height:13px;transition:transform .2s ease;}
    .card__more[aria-expanded="true"] .chev{transform:rotate(180deg);}

    .card__drawer{position:relative;z-index:2;padding:2px 14px 14px;}
    .card__drawer[hidden]{display:none;}
    .embed{border-radius:12px;overflow:hidden;background:color-mix(in oklab,var(--ink) 5%,transparent);}
    .embed iframe{display:block;width:100%;border:0;}
    .embed--video{position:relative;aspect-ratio:16/9;}
    .embed--video iframe{position:absolute;inset:0;width:100%;height:100%;}
    .drawer__open{
      display:inline-flex;align-items:center;gap:5px;margin-top:10px;
      font-size:12px;font-weight:600;letter-spacing:.03em;
      color:var(--accent);text-decoration:none;
    }
    .drawer__open svg{width:13px;height:13px;}
    .drawer__open:hover{opacity:.7;}

    /* ---- featured (Give) ---- */
    .card--featured{
      background:linear-gradient(180deg, color-mix(in oklab,var(--accent) 92%,#fff 0%), color-mix(in oklab,var(--accent) 78%,#000 22%));
      border-color:transparent;
      box-shadow:0 2px 6px color-mix(in oklab,var(--accent) 30%,transparent), 0 14px 30px color-mix(in oklab,var(--accent) 24%,transparent);
    }
    .card--featured .card__title{color:#fff;}
    .card--featured .card__desc{color:rgba(255,255,255,.74);}
    .card--featured .card__logo .glyph{color:#fff;}
    .card--featured .card__ext{color:rgba(255,255,255,.85);opacity:1;}
    .card--featured .iconbtn{color:rgba(255,255,255,.78);}
    .card--featured .iconbtn:hover{background:rgba(255,255,255,.16);color:#fff;}
    .card--featured:hover{transform:translateY(-2px);box-shadow:0 4px 10px color-mix(in oklab,var(--accent) 34%,transparent),0 20px 40px color-mix(in oklab,var(--accent) 30%,transparent);}

    /* ---- footer ---- */
    .foot{
      display:flex;align-items:center;justify-content:center;gap:10px;
      margin-top:40px;color:var(--muted);font-size:13px;
    }
    .foot .dot{opacity:.6;}

    /* ---- toast ---- */
    .toast{
      position:fixed;left:50%;bottom:26px;transform:translate(-50%,16px);
      display:flex;align-items:center;gap:8px;
      background:var(--ink);color:var(--bg);
      padding:11px 16px;border-radius:12px;
      font-size:13.5px;font-weight:500;
      box-shadow:0 10px 30px rgba(0,0,0,.22);
      opacity:0;pointer-events:none;z-index:50;
      transition:opacity .22s ease, transform .22s ease;
    }
    .toast svg{width:15px;height:15px;color:#7FD8B0;}
    .toast__icon{display:flex;}
    .toast--show{opacity:1;transform:translate(-50%,0);}

    /* ---- QR modal ---- */
    .modal{
      position:fixed;inset:0;z-index:60;
      background:rgba(28,24,16,.42);backdrop-filter:blur(3px);
      display:flex;align-items:center;justify-content:center;padding:24px;
      animation:fade .18s ease;
    }
    @keyframes fade{from{opacity:0;}to{opacity:1;}}
    .modal__card{
      position:relative;width:100%;max-width:320px;
      background:var(--card);border:1px solid var(--card-bd);
      border-radius:22px;padding:26px 24px 22px;text-align:center;
      box-shadow:0 24px 60px rgba(0,0,0,.3);
      animation:pop .2s cubic-bezier(.2,.9,.3,1.2);
    }
    @keyframes pop{from{opacity:0;transform:scale(.94) translateY(8px);}to{opacity:1;transform:none;}}
    .modal__close{position:absolute;top:12px;right:12px;}
    .modal__label{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--label);}
    .modal__title{font-family:var(--serif);font-weight:600;font-size:20px;margin-top:4px;color:var(--ink);}
    .qr{
      width:188px;height:188px;margin:18px auto 14px;
      background:#fff;border-radius:14px;padding:12px;
      display:flex;align-items:center;justify-content:center;
      box-shadow:inset 0 0 0 1px rgba(0,0,0,.05);
    }
    .qr img{width:100%;height:100%;image-rendering:pixelated;display:block;}
    .qr__fallback{color:var(--muted);font-size:13px;}
    .modal__url{font-size:12.5px;color:var(--muted);word-break:break-all;margin-bottom:18px;}
    .modal__btns{display:flex;gap:9px;}
    .btn{
      flex:1;padding:11px 14px;border-radius:11px;border:none;cursor:pointer;
      background:var(--accent);color:#fff;font-size:13.5px;font-weight:600;font-family:var(--sans);
      text-decoration:none;display:flex;align-items:center;justify-content:center;
      transition:filter .14s ease,transform .1s ease;
    }
    .btn:hover{filter:brightness(1.08);}
    .btn:active{transform:scale(.97);}
    .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
    .btn--ghost{background:transparent;color:var(--ink-soft);box-shadow:inset 0 0 0 1.5px var(--card-bd);}
    .btn--ghost:hover{filter:none;background:color-mix(in oklab,var(--ink) 6%,transparent);}

    @media (prefers-reduced-motion:reduce){
      *{animation-duration:.001ms !important;transition-duration:.001ms !important;}
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Content is rendered from config.json by app.js. -->
    <main class="wrap" id="app"></main>
    <noscript>
      <div class="wrap" style="text-align:center;color:var(--muted)">
        <p>This page needs JavaScript to load. Visit
          <a href="https://www.lifechurchriversidedetroit.org">lifechurchriversidedetroit.org</a>.</p>
      </div>
    </noscript>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <span class="toast__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg></span>
    <span class="toast__msg"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js" integrity="sha384-8FWZA6BGMXhsfO+BLtrJK0We6gg5o1JyO8xQm6peWDEUs17ACA5ziE/NIAkl9z2k" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
